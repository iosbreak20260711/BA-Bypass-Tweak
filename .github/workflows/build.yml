name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # 使用官方最新的 Mac 伺服器（已內建 Xcode 與 SDK）
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos Directly
        run: |
          # 繞過不穩定的 git clone，改用官方推薦的腳本一鍵安裝
          bash -c "$(curl -fsSL https://githubusercontent.com)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # Mac 系統有自帶 SDK，我們不需要額外下載，直接編譯
          make TARGET=iphone:clang:latest:14.0
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
