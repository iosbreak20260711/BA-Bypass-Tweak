name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Theos and iOS SDK
        run: |
          # 安裝基礎編譯工具
          sudo apt-get update
          sudo apt-get install -y build-essential git rsync ccache
          
          # 下載並安裝 Theos
          bash -c "$(curl -fsSL https://githubusercontent.com)"
          
          # 下載 iOS SDK 確保編譯不會出錯
          git clone https://github.com ~/theos/sdks
          
          # 設定環境變數
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # 強制指定使用剛才下載的 SDK 進行編编译
          make TARGET=iphone:clang:latest:14.0
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v3
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
