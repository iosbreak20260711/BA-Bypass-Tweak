name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos and iOS SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git rsync ccache clang
          
          # 這裡修正為正確的 github.com 並加上極速下載參數
          git clone --depth=1 --recursive https://github.com ~/theos
          
          # 這裡也修正為正確的 github.com
          git clone --depth=1 https://github.com ~/theos/sdks
          
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make TARGET=iphone:clang:latest:14.0
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
