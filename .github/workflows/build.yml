name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用 GitHub 內部打包好的 Theos 環境組件，完全繞過外部網絡下載
      - name: Setup Theos Environment
        uses: p035w11/setup-theos@master

      - name: Build Dylib
        run: |
          # 這裡的 THEOS 環境變數會由上面的組件自動建立，直接執行編譯
          make TARGET=iphone:clang:latest:14.0
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
