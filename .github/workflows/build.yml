name: Build iOS Dylib

on:
  workflow_dispatch: # 讓你可以手動點擊按鈕來編譯

jobs:
  build:
    runs-on: macos-13 # 使用 GitHub 的雲端 Mac 電腦
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://githubusercontent.com)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make
          
      - name: Upload Dylib Artifact
        uses: actions/artifacts@v3
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
