name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # 使用自帶 Xcode 環境的 Mac 伺服器
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos and SDK Directly
        run: |
          # 1. 建立並設定環境變數
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          export THEOS=$HOME/theos
          
          # 2. 直接使用官方 Git 複製 Theos 核心（使用最穩定的官方連結）
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 3. 下載 iOS SDK 放到正確的地方
          git clone https://github.com $THEOS/sdks

      - name: Build Dylib
        run: |
          export THEOS=$HOME/theos
          # 執行編譯
          make TARGET=iphone:clang:latest:14.0
          
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BABypass-Dylib
          path: .theos/obj/debug/*.dylib
